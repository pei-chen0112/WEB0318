<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設計稿按鈕實作</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
    
    <style>
        /* 基礎版面設定，加上背景色讓白色按鈕更明顯 */
        body {
            padding: 50px;
            background-color: #f6f6f6; 
        }

        /* 按鈕的主要 CSS 樣式 */
        .view-info-btn {
            /* 1. 尺寸與圓角 (size: h22 / R8) */
            height: 22px;
            border-radius: 8px;
            box-sizing: border-box; /* 確保邊框算在高度內 */
            
            /* 2. 背景與邊框 (background #ffffff / outline 1px #2f2f2f) */
            background-color: #ffffff;
            border: 1px solid #2f2f2f; /* 在網頁實作中，通常用 border 來配合圓角 */
            
            /* 3. 字體樣式 (Font style: Roboto Regular 13px / Color: #2f2f2f) */
            font-family: 'Roboto', sans-serif;
            font-weight: 400; /* Regular 的粗細度 */
            font-size: 13px;
            color: #2f2f2f;
            
            /* 4. 內容對齊 (讓文字垂直與水平置中) */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px; /* 加上適當的左右內距 */
            
            /* 5. 滑鼠游標與轉場效果 */
            cursor: pointer;
            transition: background-color 0.2s;
        }

        /* 加上滑鼠懸停 (hover) 的互動效果 */
        .view-info-btn:hover {
            background-color: #eaeaee;
        }
    </style>
</head>
<body>

    <button class="view-info-btn">查看資訊</button>

</body>
</html>
