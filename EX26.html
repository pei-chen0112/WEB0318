<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Image Styling Practice</title>
  <style>
    /* A simple flexbox container to align the images horizontally */
    .image-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    /* Left Image: Rounded corners, no distortion */
    .img-left {
      width: 33%;
      height: 300px;
      border-radius: 18px;
      object-fit: cover; /* This prevents the image from distorting */
    }

    /* Center Image: Circular, no distortion */
    .img-center {
      width: 150px;
      height: 150px;
      border-radius: 150px; /* Alternatively, 50% works here to make a perfect circle */
      object-fit: cover; /* This prevents the image from distorting */
    }

    /* Right Image: Intentional distortion */
    .img-right {
      width: 33%;
      height: 300px;
      /* Notice the absence of object-fit: cover; this causes the natural distortion requested */
    }
  </style>
</head>
<body>

  <div class="image-container">
    <img src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&w=600&q=80" alt="Eiffel Tower Left" class="img-left">
    
    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=600&q=80" alt="Landscape Center" class="img-center">
    
    <img src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&w=600&q=80" alt="Eiffel Tower Right" class="img-right">
  </div>

</body>
</html>
